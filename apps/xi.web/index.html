    <!-- Перехват beforeinstallprompt до загрузки приложения, иначе событие можно пропустить -->

      window.__beforeInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__beforeInstallPrompt = e;

    />
    <script>
      (function () {
        var themeKey = 'sovlium-theme';
        var chosenKey = 'sovlium-theme-chosen';
        var stored = null;
        var chosen = false;

        try {
          stored = localStorage.getItem(themeKey);
          chosen = localStorage.getItem(chosenKey) === '1';
        } catch (e) {}

        var preference =
          chosen && (stored === 'light' || stored === 'dark')
            ? stored
            : 'light';

        document.documentElement.setAttribute('data-theme', preference);
        document.documentElement.setAttribute('data-theme-preference', preference);
      })();
    </script>
    <meta name="robots" content="noindex, nofollow" />
